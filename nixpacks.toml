[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "php82Packages.mysql"]

[phases.install]
cmds = [
  "apt-get update",
  "apt-get install -y php8.2-mysql php8.2-mbstring php8.2-bcmath"
]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "php artisan config:clear",
  "php artisan cache:clear"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"